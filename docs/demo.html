<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLX VibeVoice — Audio Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
  }
  .card {
    max-width: 520px;
    width: 90%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 32px;
    text-align: center;
  }
  h1 {
    font-size: 1.4em;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #8b949e;
    font-size: 0.9em;
    margin-bottom: 24px;
  }
  audio {
    width: 100%;
    margin-bottom: 16px;
    border-radius: 8px;
  }
  .desc {
    color: #8b949e;
    font-size: 0.85em;
    line-height: 1.5;
  }
  a {
    color: #58a6ff;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }
  .back {
    margin-top: 20px;
    display: inline-block;
    font-size: 0.85em;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🎙️ MLX VibeVoice</h1>
    <p class="subtitle">Audio Demo</p>
    <audio controls src="assets/multi-role-dialogue-demo.mp3">
      Your browser does not support the audio element.
    </audio>
    <p class="desc">
      Multi-role dialogue demo — generated with Qwen3 TTS and custom reference voices.
    </p>
    <a class="back" href="https://github.com/vanselee/MLX-VibeVoice">← Back to GitHub</a>
  </div>
</body>
</html>
